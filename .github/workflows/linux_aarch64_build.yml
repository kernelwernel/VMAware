name: Linux aarch64 Build

on:
  push:
    branches: ["main"]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.hpp'
      - '.github/workflows/linux_aarch64_build.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.hpp'
      - '.github/workflows/linux_aarch64_build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-aarch64-linux-gnu qemu-user-static

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Dev_Release \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -S ${{ github.workspace }}

      - name: Build
        run: cmake --build build --config Release

      - name: Run binary
        run: qemu-aarch64-static -L /usr/aarch64-linux-gnu build/vmaware

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmaware-linux-aarch64
          path: build/vmaware
          if-no-files-found: error
          retention-days: 30
