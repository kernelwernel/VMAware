name: Build and publish APT repository

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - '.github/workflows/apt_repo.yml'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper cmake g++ build-essential dpkg-dev apt-utils

      - name: Build .deb packages
        run: dpkg-buildpackage -us -uc -b

      - name: Collect built packages
        run: |
          mkdir -p /tmp/debs
          cp ${{ github.workspace }}/../*.deb /tmp/debs/

      - name: Import GPG signing key
        run: echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update APT repository
        run: |
          cp /tmp/debs/vmaware_*.deb /tmp/debs/vmaware-dev_*.deb gh-pages/

          cd gh-pages

          dpkg-scanpackages --multiversion . > Packages
          gzip -k -f Packages

          {
            echo "Origin: VMAware"
            echo "Label: VMAware"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: amd64 all"
            echo "Components: main"
            echo "Description: VMAware APT repository"
          } > Release
          apt-ftparchive release . >> Release

          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "APT repo: ${{ github.event.release.tag_name || 'manual' }}"
          git push
